services:
  armn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: armn
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - FIRST=false
      - HOST=0.0.0.0
      - PORT=8080
      - TRUST_PROXY=true
    networks:
      - armn-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: armn-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - armn-network
    depends_on:
      armn:
        condition: service_healthy

networks:
  armn-network:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
