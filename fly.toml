app = "armn"
primary_region = "iad"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  TRUST_PROXY = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[checks]]
  name = "health"
  type = "http"
  port = 8080
  path = "/health"
  interval = "30s"
  timeout = "5s"
